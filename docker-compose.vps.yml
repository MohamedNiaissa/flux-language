services:
  traefik:
    image: "traefik"
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.mytlschallenge.acme.tlschallenge=true"
      - "--certificatesresolvers.mytlschallenge.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.mytlschallenge.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_data:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

  flux:
    image: ghcr.io/mohamedniaissa/flux-language:latest
    container_name: flux
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.flux.rule=Host(`${DOMAIN_NAME}`)
      - traefik.http.routers.flux.tls=true
      - traefik.http.routers.flux.entrypoints=websecure
      - traefik.http.routers.flux.tls.certresolver=mytlschallenge
      - traefik.http.services.flux.loadbalancer.server.port=3000

volumes:
  traefik_data:
    external: true