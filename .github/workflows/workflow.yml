name: CI/CD - Flux Language

on:
  push:
    branches:
      - main
      - feat/metrics
  pull_request:
    branches:
      - main

jobs:
  # ─── 1. TEST ────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─── 2. BUILD & PUSH ────────────────────────────────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # by setting permissions we remove the default read and write permissions unless we put it back manually
    permissions:
      packages: write # gives the runner permission to upload (push) new images to the GitHub Container Registry
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ secrets.USERNAME }}/flux-language:latest

  # ─── 3. DEPLOY ──────────────────────────────────────────────────────────────
  # Only runs on direct pushes to main (not on pull requests)
  deploy:
    needs: build-and-push
    # if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "docker compose pull flux && docker compose up -d flux"

